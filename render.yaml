# Render Blueprint для автоматичного деплою LMS системи
# Free tier версія (без Celery workers)

services:
  # Django Backend
  - type: web
    name: learn-ucu-backend
    runtime: python
    plan: free
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: cd backend && gunicorn lms_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: learn-ucu-postgres
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0


  # React Frontend
  - type: web
    name: learn-ucu
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm install -g serve && serve -s build -l $PORT
    envVars:
      - key: REACT_APP_API_URL
        sync: false
      - key: NODE_VERSION
        value: 18.17.0

databases:
  - name: learn-ucu-postgres
    databaseName: lms_db
    plan: free

