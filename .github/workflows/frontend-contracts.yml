name: Frontend Contracts

on:
  pull_request:
    paths:
      - "frontend/**"
      - "backend-spring/lms-api-gateway/src/main/resources/application.yml"
      - "backend-spring/lms-api-gateway/src/main/resources/application-docker.yml"
      - ".github/workflows/frontend-contracts.yml"
  workflow_dispatch:

jobs:
  frontend-contract-tests:
    name: Frontend Route Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install Dependencies
        run: npm ci

      - name: Run Frontend Contract Tests
        run: npm run test:contracts
