server {
    listen 10000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve built files, fallback to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: serve static assets with cache headers
    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?|ttf|eot)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Return 404 for /admin since admin is on backend service
    location /admin {
        return 404;
    }
}
