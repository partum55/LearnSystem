server:
  port: 8084

spring:
  application:
    name: lms-gradebook-service
  datasource:
    url: jdbc:postgresql://localhost:5432/lms_gradebook
    username: lms_user
    password: change_me
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000
            loggerLevel: full

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      probes:
        enabled: true

security:
  cors:
    allowed-origins: "http://localhost:3000,http://localhost:8080"
  jwt:
    issuer: "lms-gradebook"

services:
  course:
    base-url: http://localhost:8082
  assessment:
    base-url: http://localhost:8083
  submission:
    base-url: http://localhost:8085
