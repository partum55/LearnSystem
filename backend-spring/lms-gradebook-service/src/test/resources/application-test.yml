spring:
  application:
    name: lms-gradebook-service-test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

security:
  cors:
    allowed-origins: "http://localhost:3000"
  jwt:
    issuer: "lms-gradebook-test"
    secret: "test-secret-key-for-jwt-tokens-minimum-256-bits-long"

services:
  course:
    base-url: http://localhost:8082
  assessment:
    base-url: http://localhost:8083
  submission:
    base-url: http://localhost:8085

