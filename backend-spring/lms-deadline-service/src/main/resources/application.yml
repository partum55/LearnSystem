spring:
  application:
    name: lms-deadline-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lms_db}
    username: ${SPRING_DATASOURCE_USERNAME:lms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:lms_password}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

# Scheduler defaults
deadline:
  ingestion:
    cron: "0 */10 * * * *"
workload:
  snapshot:
    cron: "0 0 * * * *"
notification:
  dispatch:
    cron: "0 */15 * * * *"
  thresholds:
    overload-minutes: 240

services:
  submission:
    base-url: http://localhost:8087

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

logging:
  level:
    com.university.lms.deadline: INFO

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
