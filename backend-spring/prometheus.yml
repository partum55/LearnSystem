global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lms-services'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['lms-user-service:8081', 'lms-course-service:8082', 'lms-assessment-service:8083', 'lms-api-gateway:8080']

  - job_name: 'lms-ai-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['lms-ai-service:8085']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ai-service'

