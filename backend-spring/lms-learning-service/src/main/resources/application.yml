spring:
  application:
    name: lms-learning-service

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/lms_dev}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: course_flyway_schema_history
    schemas: public

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2

  cache:
    type: redis
    redis:
      cache-null-values: false
      time-to-live: 3600000 # 1 hour
      use-key-prefix: true
      key-prefix: "course:cache:"

# Security Configuration
security:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://localhost:3000,http://localhost:5173,https://localhost:5173}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:CHANGE-ME-set-a-secure-jwt-secret-in-env-vars}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:2592000000}

submission:
  storage:
    path: ${SUBMISSION_STORAGE_PATH:/tmp/lms-submissions}

editor:
  document:
    max-json-bytes: ${EDITOR_MAX_JSON_BYTES:2097152}
    max-blocks: ${EDITOR_MAX_BLOCKS:2000}
  table:
    max-rows: ${EDITOR_MAX_TABLE_ROWS:100}
    max-columns: ${EDITOR_MAX_TABLE_COLUMNS:20}
  embed:
    allowed-hosts: ${EDITOR_ALLOWED_EMBED_HOSTS:youtube.com,www.youtube.com,youtu.be}
  media:
    storage:
      path: ${EDITOR_MEDIA_STORAGE_PATH:/tmp/lms-editor-media}
    max-file-size-bytes: ${EDITOR_MEDIA_MAX_FILE_SIZE_BYTES:10485760}
    allowed-mime-types: ${EDITOR_MEDIA_ALLOWED_MIME_TYPES:image/png,image/jpeg,image/gif,image/webp,application/pdf}
    allowed-extensions: ${EDITOR_MEDIA_ALLOWED_EXTENSIONS:png,jpg,jpeg,gif,webp,pdf}

deadline:
  ingestion:
    cron: ${DEADLINE_INGESTION_CRON:0 */10 * * * *}

workload:
  snapshot:
    cron: ${WORKLOAD_SNAPSHOT_CRON:0 0 * * * *}

notification:
  dispatch:
    cron: ${NOTIFICATION_DISPATCH_CRON:0 */15 * * * *}
  thresholds:
    overload-minutes: ${NOTIFICATION_OVERLOAD_MINUTES:240}

server:
  port: ${PORT:8089}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: lms-learning-service

logging:
  level:
    com.university.lms.course: ${LOG_LEVEL:INFO}
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

# Eureka Client Configuration
eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}

plugin:
  storage:
    path: ${PLUGIN_STORAGE_PATH:/data/plugins}
  python:
    enabled: ${PLUGIN_PYTHON_ENABLED:true}
    executable: ${PLUGIN_PYTHON_EXECUTABLE:python3}
    port-range-start: ${PLUGIN_PYTHON_PORT_RANGE_START:9100}
    port-range-end: ${PLUGIN_PYTHON_PORT_RANGE_END:9200}
    health-check-timeout-seconds: ${PLUGIN_PYTHON_HEALTH_CHECK_TIMEOUT:30}
    venv-enabled: ${PLUGIN_PYTHON_VENV_ENABLED:true}
    install-timeout-seconds: ${PLUGIN_PYTHON_INSTALL_TIMEOUT:120}
