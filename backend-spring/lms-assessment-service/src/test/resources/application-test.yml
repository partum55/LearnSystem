spring:
  application:
    name: lms-assessment-service-test

  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    baseline-on-migrate: true

  cache:
    type: redis

jwt:
  secret: test-secret-key-for-testing-purposes-must-be-at-least-256-bits-long-hs256
  expiration: 3600000

logging:
  level:
    com.university.lms: DEBUG

