version: '3.8'

services:
  # Ollama Service для Llama AI
  ollama:
    image: ollama/ollama:latest
    container_name: lms-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Після старту потрібно виконати: docker exec lms-ollama ollama pull llama3.1

  # AI Service
  ai-service:
    build:
      context: ./lms-ai-service
      dockerfile: ../Dockerfile
    container_name: lms-ai-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - LLAMA_API_URL=http://ollama:11434
      - LLAMA_MODEL=llama3.1
      - COURSE_SERVICE_URL=http://course-service:8081
      - ASSESSMENT_SERVICE_URL=http://assessment-service:8083
    depends_on:
      - ollama
      - course-service
      - assessment-service
    networks:
      - lms-network
    restart: unless-stopped

  # Course Service (припускається що вже є)
  course-service:
    build:
      context: ./lms-course-service
      dockerfile: ../Dockerfile
    container_name: lms-course-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - lms-network

  # Assessment Service (припускається що вже є)
  assessment-service:
    build:
      context: ./lms-assessment-service
      dockerfile: ../Dockerfile
    container_name: lms-assessment-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - lms-network

networks:
  lms-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local

