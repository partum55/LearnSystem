spring:
  application:
    name: lms-course-service-test

  datasource:
    url: jdbc:tc:postgresql:15-alpine:///testdb
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  cache:
    type: redis

# JWT Configuration for tests
jwt:
  secret: test-secret-key-for-testing-purposes-must-be-at-least-256-bits-long-hs256
  expiration: 3600000

# Logging
logging:
  level:
    com.university.lms: DEBUG
    org.springframework.security: DEBUG

