server:
  port: 8085

spring:
  application:
    name: lms-ai-service

  # Database Configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/lms_db}
    username: ${DB_USERNAME:lms_user}
    password: ${DB_PASSWORD:lms_password}
    driver-class-name: org.postgresql.Driver

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Flyway Configuration - Disabled (shared DB with other services)
  flyway:
    enabled: false
    # AI service uses shared database, migrations are handled by user-service

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 60000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# Llama API Configuration
llama:
  api:
    url: ${LLAMA_API_URL:https://api.groq.com/openai/v1}
    key: ${LLAMA_API_KEY:}  # API ключ (для Groq, Together AI, etc.)
    model: ${LLAMA_MODEL:llama-3.3-70b-versatile}  # Updated to v3.3
    timeout: 120000  # 2 minutes for long generations
    max-retries: 3

# Other services
services:
  course-service:
    url: ${COURSE_SERVICE_URL:http://localhost:8081}
  assessment-service:
    url: ${ASSESSMENT_SERVICE_URL:http://localhost:8083}

# Logging
logging:
  level:
    com.university.lms.ai: DEBUG
    org.springframework.web.reactive: INFO

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
