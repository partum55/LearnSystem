# Docker profile for user-service
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/lms_db}
    username: ${SPRING_DATASOURCE_USERNAME:lms_user}
    password: ${SPRING_DATASOURCE_PASSWORD:lms_password}

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  mail:
    enabled: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: user_flyway_schema_history
    validate-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: none

# Disable CORS - API Gateway handles CORS for all services
security:
  cors:
    enabled: false

management:
  health:
    mail:
      enabled: false

app:
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    email: ${BOOTSTRAP_ADMIN_EMAIL:admin@ucu.edu.ua}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:admin123}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URI:http://eureka-server:8761/eureka}
  instance:
    prefer-ip-address: true
    hostname: user-service
