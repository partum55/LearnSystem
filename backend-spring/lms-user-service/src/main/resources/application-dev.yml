spring:
  application:
    name: lms-user-service


  # In-memory H2 database for quick testing
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # Disable Redis for development
  cache:
    type: simple

  # Disable Flyway for dev (using ddl-auto=create-drop)
  flyway:
    enabled: false

# JWT Configuration (less secure defaults for development)
jwt:
  secret: dev-secret-key-for-testing-only-not-for-production-use-at-least-256-bits
  expiration: 86400000 # 24 hours
  refresh-expiration: 2592000000 # 30 days

# Security Configuration
security:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080,http://localhost:5173
  rate-limit:
    enabled: true
  password:
    min-length: 12
    require-uppercase: true
    require-lowercase: true
    require-digit: true
    require-special: true
  account-lockout:
    enabled: true
    max-attempts: 5
    lockout-duration: 15

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
  error:
    include-message: always
    include-binding-errors: always

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Logging Configuration
logging:
  level:
    root: INFO
    com.university.lms: DEBUG
    com.university.lms.user.security: INFO
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

