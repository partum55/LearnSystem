spring:
    total-size-cap: 1GB
    max-history: 30
    max-size: 10MB
    name: /var/log/lms/user-service.log
  file:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
  pattern:
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
    com.university.lms.user.security: INFO
    com.university.lms: INFO
    root: WARN
  level:
logging:
# Logging Configuration

      environment: production
      application: ${spring.application.name}
    tags:
        enabled: true
      prometheus:
    export:
  metrics:
        enabled: true
      probes:
      show-details: never
    health:
  endpoint:
      base-path: /actuator
        include: health,info,prometheus
      exposure:
    web:
  endpoints:
management:
# Actuator Configuration

    key-store-type: PKCS12
    key-store-password: ${SSL_KEY_STORE_PASSWORD:}
    key-store: ${SSL_KEY_STORE:}
    enabled: ${SSL_ENABLED:false}
  ssl:
    enabled: true
  http2:
    include-exception: false
    include-stacktrace: never
    include-binding-errors: never
    include-message: never
  error:
    min-response-size: 1024
    mime-types: application/json,application/xml,text/html,text/xml,text/plain
    enabled: true
  compression:
    context-path: /api
  servlet:
  port: ${SERVER_PORT:8080}
server:
# Server Configuration

    lockout-duration: 15
    max-attempts: 5
    enabled: true
  account-lockout:
    require-special: true
    require-digit: true
    require-lowercase: true
    require-uppercase: true
    min-length: 12
  password:
    enabled: true
  rate-limit:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  cors:
security:
# Security Configuration

  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days in production
  expiration: ${JWT_EXPIRATION:3600000} # 1 hour in production
  secret: ${JWT_SECRET}
jwt:
# JWT Configuration

    validate-on-migrate: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    enabled: true
  flyway:

      cache-null-values: false
      time-to-live: 600000 # 10 minutes
    redis:
    type: redis
  cache:

          min-idle: 5
          max-idle: 10
          max-active: 20
        pool:
      lettuce:
      ssl: true
      timeout: 60000ms
      password: ${SPRING_DATA_REDIS_PASSWORD}
      port: ${SPRING_DATA_REDIS_PORT}
      host: ${SPRING_DATA_REDIS_HOST}
    redis:
  data:

    open-in-view: false
        query.in_clause_parameter_padding: true
        order_updates: true
        order_inserts: true
          batch_size: 50
        jdbc:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate:
    properties:
    show-sql: false
      ddl-auto: validate
    hibernate:
  jpa:

      leak-detection-threshold: 60000
      max-lifetime: 1800000
      idle-timeout: 600000
      connection-timeout: 30000
      minimum-idle: 5
      maximum-pool-size: 20
    hikari:
    driver-class-name: org.postgresql.Driver
    password: ${SPRING_DATASOURCE_PASSWORD}
    username: ${SPRING_DATASOURCE_USERNAME}
    url: ${SPRING_DATASOURCE_URL}
  datasource:

    active: production
  profiles:

    name: lms-user-service
  application:

