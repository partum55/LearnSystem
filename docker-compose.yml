services:
  # API Gateway
  api-gateway:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-api-gateway
    container_name: lms-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Eureka Server
  eureka-server:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-eureka-server
    container_name: lms-eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8761/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # User Service
  user-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-user-service
    container_name: lms-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lms_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network

  # Analytics Service
  analytics-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-analytics-service
    container_name: lms-analytics-service
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8088
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lms_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network

  # Course Service
  course-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-course-service
    container_name: lms-course-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lms_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      - postgres
      - redis
      - eureka-server
    networks:
      - lms-network

  # Assessment Service
  assessment-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-assessment-service
    container_name: lms-assessment-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lms_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      - postgres
      - redis
      - eureka-server
    networks:
      - lms-network

  # Gradebook Service
  gradebook-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-gradebook-service
    container_name: lms-gradebook-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lms_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      - postgres
      - redis
      - eureka-server
    networks:
      - lms-network

  # Deadline Service
  deadline-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-deadline-service
    container_name: lms-deadline-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8086
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-lms_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      - postgres
      - eureka-server
    networks:
      - lms-network

  # AI Service
  ai-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-ai-service
    container_name: lms-ai-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8085
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      DB_USERNAME: ${POSTGRES_USER:-lms_user}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LLAMA_API_URL: ${LLAMA_API_URL:-https://api.groq.com/openai/v1}
      LLAMA_API_KEY: ${LLAMA_API_KEY}
      LLAMA_MODEL: ${LLAMA_MODEL:-llama-3.1-70b-versatile}
      EUREKA_URI: http://eureka-server:8761/eureka
    depends_on:
      - postgres
      - redis
      - eureka-server
    networks:
      - lms-network
    profiles:
      - ai

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: lms-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080/api}
      REACT_APP_AI_SERVICE_URL: ${REACT_APP_AI_SERVICE_URL:-http://localhost:8080/api/ai}
      CHOKIDAR_USEPOLLING: "true"  # For hot reload in Docker
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api-gateway
    networks:
      - lms-network
    stdin_open: true
    tty: true

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  spring_logs:
    driver: local
  python_static:
    driver: local
  python_media:
    driver: local
  ollama_data:
    driver: local

networks:
  lms-network:
    driver: bridge
