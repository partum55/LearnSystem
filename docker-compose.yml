services:
  # ==========================================
  # DATABASE & CACHE
  # ==========================================

  postgres:
    image: postgres:15-alpine
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ==========================================
  # SERVICE DISCOVERY
  # ==========================================

  eureka-server:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-eureka-server
    container_name: lms-eureka-server
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx512m -Xms256m
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # MICROSERVICES
  # ==========================================

  user-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-user-service
    container_name: lms-user-service
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-CHANGE-ME-set-a-secure-jwt-secret-in-env-vars}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  learning-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-learning-service
    container_name: lms-learning-service
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8089
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-CHANGE-ME-set-a-secure-jwt-secret-in-env-vars}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - SUBMISSION_STORAGE_PATH=/tmp/lms-submissions
      - JAVA_OPTS=-Xmx768m -Xms384m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ==========================================
  # AI SERVICE - Special Configuration
  # ==========================================

  ai-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-ai-service
    container_name: lms-ai-service
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8085
      # Database
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - DB_USERNAME=${POSTGRES_USER:-lms_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Llama API Configuration
      - LLAMA_API_URL=${LLAMA_API_URL:-https://api.groq.com/openai/v1}
      - LLAMA_API_KEY=${LLAMA_API_KEY}
      - LLAMA_MODEL=${LLAMA_MODEL:-llama-3.3-70b-versatile}
      # Eureka
      - EUREKA_URI=http://eureka-server:8761/eureka
      # JVM Options - More memory for AI processing
      - JAVA_OPTS=-Xmx1g -Xms512m -XX:+UseG1GC
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s  # Longer startup time for AI service

  analytics-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-analytics-service
    container_name: lms-analytics-service
    restart: unless-stopped
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8088
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_DATA_REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET:-CHANGE-ME-set-a-secure-jwt-secret-in-env-vars}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ==========================================
  # API GATEWAY
  # ==========================================

  api-gateway:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-api-gateway
    container_name: lms-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==========================================
  # FRONTEND
  # ==========================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8080/api}
      - REACT_APP_AI_SERVICE_URL=${REACT_APP_AI_SERVICE_URL:-http://localhost:8080/api/ai}
    depends_on:
      - api-gateway
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

# ==========================================
# VOLUMES
# ==========================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================

networks:
  lms-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
