# ==========================================
# LearnSystemUCU - Docker Compose
# ==========================================
# Supports external Supabase PostgreSQL or local fallback postgres container.
# If SUPABASE_* variables are set, services use Supabase; otherwise they use local postgres.
#
# Quick start (using run-local.sh wrapper):
#   ./run-local.sh build    # First time
#   ./run-local.sh          # Start
#   ./run-local.sh stop     # Stop
#   ./run-local.sh status   # Health check
#   ./run-local.sh logs     # Stream logs
#
# Direct usage:
#   docker compose --env-file .env.production up -d --build
#
# Requires: .env.production (copy from .env.production.example and fill in values)

services:
  postgres:
    image: postgres:15-alpine
    container_name: lms-postgres
    restart: always
    environment:
      POSTGRES_DB: lms_db
      POSTGRES_USER: lms_user
      POSTGRES_PASSWORD: lms_password_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lms_user -d lms_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
  # ==========================================
  # CACHE (Redis — needed for rate limiting, caching)
  # ==========================================

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    networks:
      - lms-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # MICROSERVICES
  # ==========================================

  user-service:
    build:
      context: ./backend-spring
      dockerfile: lms-user-service/Dockerfile
    container_name: lms-user-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker,supabase
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${SUPABASE_DB_HOST:-postgres}:${SUPABASE_DB_PORT:-5432}/${SUPABASE_DB_NAME:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_DB_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_DB_PASSWORD:-lms_password_local}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret-key-for-jwt-must-be-at-least-256-bits-long-for-hs256-algorithm}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LEARNING_SERVICE_URL=http://learning-service:8089
      - JAVA_OPTS=-Xmx384m -Xms192m
      - BOOTSTRAP_ADMIN_ENABLED=${BOOTSTRAP_ADMIN_ENABLED:-true}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@ucu.edu.ua}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-Admin123!}
      - AES_ENCRYPTION_KEY=${AES_ENCRYPTION_KEY:-}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8081/api/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M

  learning-service:
    build:
      context: ./backend-spring
      dockerfile: lms-learning-service/Dockerfile
    container_name: lms-learning-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker,supabase
      - SERVER_PORT=8089
      # Provide both datasource env styles because docker and supabase profiles can be active together.
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${SUPABASE_DB_HOST:-postgres}:${SUPABASE_DB_PORT:-5432}/${SUPABASE_DB_NAME:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_DB_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_DB_PASSWORD:-lms_password_local}
      - DATABASE_URL=jdbc:postgresql://${SUPABASE_DB_HOST:-postgres}:${SUPABASE_DB_PORT:-5432}/${SUPABASE_DB_NAME:-lms_db}
      - DB_USERNAME=${SUPABASE_DB_USER:-lms_user}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD:-lms_password_local}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret-key-for-jwt-must-be-at-least-256-bits-long-for-hs256-algorithm}
      - SUBMISSION_STORAGE_PATH=/data/submissions
      - PLUGIN_STORAGE_PATH=/data/plugins
      - PLUGIN_PYTHON_ENABLED=true
      - PLUGIN_PYTHON_EXECUTABLE=python3
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - submission_data:/data/submissions
      - plugin_data:/data/plugins
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8089/api/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 1024M

  ai-service:
    build:
      context: ./backend-spring
      dockerfile: lms-ai-service/Dockerfile
    container_name: lms-ai-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker,supabase
      - SERVER_PORT=8085
      # AI service uses DB_URL/DB_USERNAME/DB_PASSWORD (not SPRING_DATASOURCE_*)
      - DB_URL=jdbc:postgresql://${SUPABASE_DB_HOST:-postgres}:${SUPABASE_DB_PORT:-5432}/${SUPABASE_DB_NAME:-lms_db}
      - DB_USERNAME=${SUPABASE_DB_USER:-lms_user}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD:-lms_password_local}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLAMA_API_URL=${LLAMA_API_URL:-https://api.groq.com/openai/v1}
      - LLAMA_API_KEY=${LLAMA_API_KEY}
      - LLAMA_MODEL=${LLAMA_MODEL:-llama-3.3-70b-versatile}
      - LEARNING_SERVICE_URL=http://learning-service:8089
      - USER_SERVICE_URL=http://user-service:8081
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
      - JWT_SECRET=${JWT_SECRET:-local-dev-secret-key-for-jwt-must-be-at-least-256-bits-long-for-hs256-algorithm}
      - JAVA_OPTS=-Xmx768m -Xms384m -XX:+UseG1GC
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8085/api/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024M

  # ==========================================
  # API GATEWAY
  # ==========================================

  api-gateway:
    build:
      context: ./backend-spring
      dockerfile: lms-api-gateway/Dockerfile
    container_name: lms-api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - USER_SERVICE_URL=http://user-service:8081
      - LEARNING_SERVICE_URL=http://learning-service:8089
      - AI_SERVICE_URL=http://ai-service:8085
      - EXECUTION_SERVICE_URL=http://execution-service:3000
      - GATEWAY_PUBLIC_URL=http://api-gateway:8080
      - JAVA_OPTS=-Xmx384m -Xms192m
      # CORS: add your Vercel frontend URL here (comma-separated, no trailing slash)
      # e.g. https://your-app.vercel.app,https://your-custom-domain.com
      - GATEWAY_CORS_ALLOWED_ORIGINS=${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      user-service:
        condition: service_healthy
      learning-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # FRONTEND
  # ==========================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - lms-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

  # ==========================================
  # EXECUTION SERVICE (Code Sandbox)
  # ==========================================

  execution-service:
    build: ./execution-service
    container_name: lms-execution-service
    privileged: true
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

# ==========================================
# VOLUMES
# ==========================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  submission_data:
    driver: local
  plugin_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================

networks:
  lms-network:
    driver: bridge
