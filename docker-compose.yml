# ==========================================
# LearnSystemUCU - Production Compose
# ==========================================
# Uses external Supabase PostgreSQL — no local postgres container.
#
# Quick start (using run-local.sh wrapper):
#   ./run-local.sh build    # First time
#   ./run-local.sh          # Start
#   ./run-local.sh stop     # Stop
#   ./run-local.sh status   # Health check
#   ./run-local.sh logs     # Stream logs
#
# Direct usage:
#   docker compose --env-file .env.production up -d --build
#
# Requires: .env.production (copy from .env.production.example and fill in values)

services:
  # ==========================================
  # CACHE (Redis — needed for rate limiting, caching)
  # ==========================================

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================
  # SERVICE DISCOVERY
  # ==========================================

  eureka-server:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-eureka-server
    container_name: lms-eureka-server
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 384M

  # ==========================================
  # MICROSERVICES
  # ==========================================

  user-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-user-service
    container_name: lms-user-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker,supabase
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:-6543}/${SUPABASE_DB_NAME:-postgres}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx384m -Xms192m
      - BOOTSTRAP_ADMIN_ENABLED=${BOOTSTRAP_ADMIN_ENABLED:-false}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@ucu.edu.ua}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M

  learning-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-learning-service
    container_name: lms-learning-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker,supabase
      - SERVER_PORT=8089
      # Learning service supabase profile uses DATABASE_URL / DB_USERNAME / DB_PASSWORD
      - DATABASE_URL=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:-6543}/${SUPABASE_DB_NAME:-postgres}
      - DB_USERNAME=${SUPABASE_DB_USER}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - SUBMISSION_STORAGE_PATH=/data/submissions
      - JAVA_OPTS=-Xmx512m -Xms256m
    volumes:
      - submission_data:/data/submissions
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8089/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 768M

  ai-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-ai-service
    container_name: lms-ai-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker,supabase
      - SERVER_PORT=8085
      # AI service uses DB_URL/DB_USERNAME/DB_PASSWORD (not SPRING_DATASOURCE_*)
      - DB_URL=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:-6543}/${SUPABASE_DB_NAME:-postgres}
      - DB_USERNAME=${SUPABASE_DB_USER}
      - DB_PASSWORD=${SUPABASE_DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LLAMA_API_URL=${LLAMA_API_URL:-https://api.groq.com/openai/v1}
      - LLAMA_API_KEY=${LLAMA_API_KEY}
      - LLAMA_MODEL=${LLAMA_MODEL:-llama-3.3-70b-versatile}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_OPTS=-Xmx768m -Xms384m -XX:+UseG1GC
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 1024M

  analytics-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-analytics-service
    container_name: lms-analytics-service
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=docker,supabase
      - SERVER_PORT=8088
      - SPRING_DATASOURCE_URL=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:-6543}/${SUPABASE_DB_NAME:-postgres}
      - SPRING_DATASOURCE_USERNAME=${SUPABASE_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${SUPABASE_DB_PASSWORD}
      - SPRING_FLYWAY_ENABLED=false
      - SPRING_DATA_REDIS_HOST=redis
      - JWT_SECRET=${JWT_SECRET}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx384m -Xms192m
    depends_on:
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # API GATEWAY
  # ==========================================

  api-gateway:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: lms-api-gateway
    container_name: lms-api-gateway
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx384m -Xms192m
      # CORS: add your Vercel frontend URL here (comma-separated, no trailing slash)
      # e.g. https://your-app.vercel.app,https://your-custom-domain.com
      - GATEWAY_CORS_ALLOWED_ORIGINS=${GATEWAY_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================
  # FRONTEND
  # ==========================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M

# ==========================================
# VOLUMES
# ==========================================

volumes:
  redis_data:
    driver: local
  submission_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================

networks:
  lms-network:
    driver: bridge
