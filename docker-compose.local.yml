# ==========================================
# LearnSystemUCU - Local Development Docker Compose
# ==========================================
#
# USAGE:
#   docker compose -f docker-compose.local.yml up --build
#
# This file runs all services needed for local development.
#
# ==========================================


services:
  # ==========================================
  # INFRASTRUCTURE
  # ==========================================

  postgres:
    image: postgres:15-alpine
    container_name: lms-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lms_db}
      POSTGRES_USER: ${POSTGRES_USER:-lms_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lms_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lms_user} -d ${POSTGRES_DB:-lms_db}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ==========================================
  # SERVICE DISCOVERY
  # ==========================================

  eureka-server:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile.local
      args:
        SERVICE_NAME: lms-eureka-server
    container_name: lms-eureka-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-Xmx256m -Xms128m
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ==========================================
  # BACKEND SERVICES
  # ==========================================

  user-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile.local
      args:
        SERVICE_NAME: lms-user-service
    container_name: lms-user-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      - SPRING_FLYWAY_TABLE=user_flyway_schema_history
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx384m -Xms192m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 90s

  course-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile.local
      args:
        SERVICE_NAME: lms-course-service
    container_name: lms-course-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      - SPRING_FLYWAY_TABLE=course_flyway_schema_history
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx384m -Xms192m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  assessment-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile.local
      args:
        SERVICE_NAME: lms-assessment-service
    container_name: lms-assessment-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      - SPRING_FLYWAY_TABLE=assessment_flyway_schema_history
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx384m -Xms192m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  gradebook-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile.local
      args:
        SERVICE_NAME: lms-gradebook-service
    container_name: lms-gradebook-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8084
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-lms_user}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      - SPRING_FLYWAY_TABLE=gradebook_flyway_schema_history
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx384m -Xms192m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ==========================================
  # AI SERVICE
  # ==========================================

  ai-service:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile.local
      args:
        SERVICE_NAME: lms-ai-service
    container_name: lms-ai-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SERVER_PORT=8085
      - DB_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-lms_db}
      - DB_USERNAME=${POSTGRES_USER:-lms_user}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-lms_password}
      - SPRING_FLYWAY_TABLE=ai_flyway_schema_history
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-dev-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - LLAMA_API_URL=${LLAMA_API_URL:-https://api.groq.com/openai/v1}
      - LLAMA_API_KEY=${LLAMA_API_KEY:-}
      - LLAMA_MODEL=${LLAMA_MODEL:-llama-3.3-70b-versatile}
      - EUREKA_URI=http://eureka-server:8761/eureka
      - JAVA_OPTS=-Xmx512m -Xms256m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s

  # ==========================================
  # API GATEWAY
  # ==========================================

  api-gateway:
    build:
      context: ./backend-spring
      dockerfile: Dockerfile.local
      args:
        SERVICE_NAME: lms-api-gateway
    container_name: lms-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URI=http://eureka-server:8761/eureka
      - REDIS_HOST=redis
      - JAVA_OPTS=-Xmx384m -Xms192m
    depends_on:
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  # ==========================================
  # FRONTEND
  # ==========================================

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
      - REACT_APP_AI_SERVICE_URL=http://localhost:8080/api/ai
    depends_on:
      api-gateway:
        condition: service_healthy
    networks:
      - lms-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

# ==========================================
# VOLUMES
# ==========================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ==========================================
# NETWORKS
# ==========================================

networks:
  lms-network:
    driver: bridge

